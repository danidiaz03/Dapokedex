<div class="home-content c-container">
  <input
    type="search"
    name="listing-search"
    id="listing-search"
    placeholder="Buscar Pokemon..."
    (input)="onSearch($any($event.target).value)"
  />

  <div class="pokemon-listing">
    @for (pokemon of filteredPokemons(); track $index) {
      <div class="pokemon-miniature" [routerLink]="['/pokemon', pokemon.name]">
        <div class="pokemon-miniature__header">
          <span class="pokemon-miniature__name">{{ pokemon.name }}</span>
          <button
            class="favorite-btn"
            [class.favorite-btn--active]="isFavorite(pokemon.id)"
            (click)="toggleFavorite($event, pokemon.id)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              />
            </svg>
          </button>
        </div>
        <div class="pokemon-miniature-image-container">
          <img [src]="pokemon.img" [alt]="pokemon.name" class="pokemon-miniature__image" />
        </div>
        <div class="pokemon-miniature__types">
          @for (t of pokemon.types; track $index) {
            <span class="type-badge type-badge--{{ t.type.name }}">
              {{ t.type.name }}
            </span>
          }
        </div>
      </div>
    }
  </div>

  @if (!searchTerm()) {
    <div class="pagination">
      <button class="pagination-btn" (click)="goTo(previousUrl())" [disabled]="!previousUrl()">
        <div class="icon-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <path
              d="M3.825 9L9.425 14.6L8 16L0 8L8 0L9.425 1.4L3.825 7H16V9H3.825V9"
              fill="currentColor"
            />
          </svg>
        </div>
        <span>PREV</span>
      </button>

      <button class="pagination-btn" (click)="goTo(nextUrl())" [disabled]="!nextUrl()">
        <span>NEXT</span>
        <div class="icon-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <path
              d="M12.175 9H0V7H12.175L6.575 1.4L8 0L16 8L8 16L6.575 14.6L12.175 9Z"
              fill="currentColor"
            />
          </svg>
        </div>
      </button>
    </div>
  }
</div>
